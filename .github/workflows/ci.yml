name: Dodo DevSecOps CI/CD

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kanakaprasad/ledger-api

jobs:
  build-security:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ledger-api-assignment/app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kanakaprasad/ledger-api

      - name: Build Docker Image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ledger-api-assignment/app
          push: true
          tags: |
            ghcr.io/kanakaprasad/ledger-api:latest
            ghcr.io/kanakaprasad/ledger-api:${{ github.sha }}

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          generateSarif: true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/kanakaprasad/ledger-api:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Container Image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ghcr.io/kanakaprasad/ledger-api:${{ github.sha }}

      - name: Generate Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/kanakaprasad/ledger-api
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: .

      - name: Pipeline Summary
        if: always()
        run: |
          echo "=================================="
          echo "Dodo Payments Task 2"
          echo "=================================="
          echo "Build           : Completed"
          echo "Semgrep         : Completed"
          echo "Gitleaks        : Completed"
          echo "Trivy           : Completed"
          echo "Cosign Signing  : Completed"
          echo "Provenance      : Completed"

